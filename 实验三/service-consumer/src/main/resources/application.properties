server.port=8080
spring.application.name=consumer-resilience
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.openfeign.circuitbreaker.enabled=true

# ==================== Resilience4J 配置 ====================

# 任务2：断路器实例A — 失败率阈值30%
resilience4j.circuitbreaker.instances.circuitBreakerA.failure-rate-threshold=30
resilience4j.circuitbreaker.instances.circuitBreakerA.sliding-window-type=TIME_BASED
resilience4j.circuitbreaker.instances.circuitBreakerA.sliding-window-size=10
resilience4j.circuitbreaker.instances.circuitBreakerA.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.circuitBreakerA.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.circuitBreakerA.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.circuitBreakerA.automatic-transition-from-open-to-half-open-enabled=true

# 任务3：断路器实例B — 失败率50%+慢调用30%@2s
resilience4j.circuitbreaker.instances.circuitBreakerB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.circuitBreakerB.slow-call-rate-threshold=30
resilience4j.circuitbreaker.instances.circuitBreakerB.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.instances.circuitBreakerB.sliding-window-type=TIME_BASED
resilience4j.circuitbreaker.instances.circuitBreakerB.sliding-window-size=10
resilience4j.circuitbreaker.instances.circuitBreakerB.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.circuitBreakerB.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.circuitBreakerB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.circuitBreakerB.automatic-transition-from-open-to-half-open-enabled=true

# 任务6：隔离器 — 线程池型，max concurrent=10, max wait=20ms
resilience4j.thread-pool-bulkhead.instances.threadPoolBulkhead.max-thread-pool-size=1
resilience4j.thread-pool-bulkhead.instances.threadPoolBulkhead.core-thread-pool-size=1
resilience4j.thread-pool-bulkhead.instances.threadPoolBulkhead.queue-capacity=10
resilience4j.thread-pool-bulkhead.instances.threadPoolBulkhead.keep-alive-duration=20ms

# 信号量型隔离器备选（任务6并发控制核心）
resilience4j.bulkhead.instances.threadPoolBulkhead.max-concurrent-calls=10
resilience4j.bulkhead.instances.threadPoolBulkhead.max-wait-duration=20ms

# 任务8：限流器 — 2秒刷新，每周期最多5个请求
resilience4j.ratelimiter.instances.rateLimiterA.limit-refresh-period=2s
resilience4j.ratelimiter.instances.rateLimiterA.limit-for-period=5
resilience4j.ratelimiter.instances.rateLimiterA.timeout-duration=0s
